name: Deploy to GitHub Pages

# Deploys the static site to GitHub Pages on every push to main. Replaces the
# legacy "pages-build-deployment" auto-builder, which intermittently failed
# with "Deployment failed, try again later" when concurrent builds raced for
# the deployment lock. The concurrency group below serialises deploys so that
# can't happen; workflow_dispatch allows a manual re-run from the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialise deployments; let an in-flight deploy finish rather than cancelling
# it (cancelling mid-deploy is what tends to leave the lock stuck).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
