name: Deploy to GitHub Pages

# Builds the Astro observatory (in observatory/) and deploys it to GitHub Pages
# at the custom domain (siriusascent.co.za). Production build uses the config
# defaults (site = siriusascent.co.za, base = /). CNAME ships in the artifact
# via observatory/public/CNAME so the custom domain persists across deploys.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialise deployments; let an in-flight deploy finish rather than cancelling.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: observatory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: observatory/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
